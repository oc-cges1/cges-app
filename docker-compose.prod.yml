services:

  # ── PostgreSQL ───────────────────────────────────────────────
  postgres:
    image: postgres:16-alpine
    container_name: sisdep_postgres_prod
    restart: always
    environment:
      POSTGRES_USER:     ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB:       ${POSTGRES_DB}
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./backups:/backups
    networks:
      - sisdep_net
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER} -d ${POSTGRES_DB}"]
      interval: 30s
      timeout:  10s
      retries:  3

  # ── Backend ──────────────────────────────────────────────────
  backend:
    image: ${REGISTRY:-sisdep}/sisdep-backend:${TAG:-latest}
    container_name: sisdep_backend_prod
    restart: always
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      NODE_ENV:           production
      PORT:               4000
      DATABASE_URL:       "postgresql://${POSTGRES_USER}:${POSTGRES_PASSWORD}@postgres:5432/${POSTGRES_DB}?schema=public"
      JWT_ACCESS_SECRET:  ${JWT_ACCESS_SECRET}
      JWT_REFRESH_SECRET: ${JWT_REFRESH_SECRET}
      JWT_ACCESS_EXPIRES: 15m
      JWT_REFRESH_EXPIRES: 7d
      FRONTEND_URL:       ${FRONTEND_URL}
      BCRYPT_ROUNDS:      "12"
      SMTP_HOST:          ${SMTP_HOST}
      SMTP_PORT:          ${SMTP_PORT}
      SMTP_USER:          ${SMTP_USER}
      SMTP_PASS:          ${SMTP_PASS}
      EMAIL_FROM:         ${EMAIL_FROM}
      RATE_LIMIT_WINDOW_MS: "900000"
      RATE_LIMIT_MAX:     "100"
    networks:
      - sisdep_net
    healthcheck:
      test: ["CMD", "wget", "--quiet", "--tries=1", "--spider", "http://localhost:4000/health"]
      interval: 30s
      timeout:  10s
      retries:  3

  # ── Frontend + Nginx ─────────────────────────────────────────
  frontend:
    image: ${REGISTRY:-sisdep}/sisdep-frontend:${TAG:-latest}
    container_name: sisdep_frontend_prod
    restart: always
    depends_on:
      backend:
        condition: service_healthy
    ports:
      - "80:80"
    networks:
      - sisdep_net

networks:
  sisdep_net:
    driver: bridge

volumes:
  postgres_data:
